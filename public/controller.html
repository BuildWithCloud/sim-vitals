<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimOx · Controller</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --surface2:#1c1c1c;
      --border:  #303030;
      --text:    #f2f2f2;
      --muted:   #8a8a8a;
      --muted2:  #c2c2c2;
      --cyan:    #56e3ff;
      --green:   #69f58d;
      --yellow:  #ffeb3b;
      --orange:  #ff9900;
      --red:     #ff6b86;
      --deep:    #b56cff;
      --label:   #d3d3d3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Consolas', monospace;
    }


    /* ── Layout ── */
    .page { max-width: 760px; margin: 0 auto; padding: 28px 24px 60px; }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .page-title { font-size: 13px; letter-spacing: 0.3em; color: var(--muted2); }
    .conn-badge {
      font-size: 10px; letter-spacing: 0.2em;
      padding: 4px 10px; border-radius: 20px;
      background: var(--border); color: var(--muted);
      transition: all 0.5s;
    }
    .conn-badge.ok  { background: rgba(105,245,141,0.14); color: var(--green); }
    .conn-badge.err { background: rgba(255,107,134,0.14);  color: var(--red); }

    /* ── Live readout ── */
    .readout {
      display: flex; gap: 20px;
      background: linear-gradient(180deg, #1a1a1a, #121212);
      border: 1px solid #2c2c2c;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }
    .readout-item { flex: 1; }
    .readout-label { font-size: 9px; letter-spacing: 0.3em; color: var(--muted2); margin-bottom: 4px; }
    .readout-val   { font-size: 28px; font-weight: 700; color: var(--label); }
    .readout-val-bp { font-size: 20px; font-weight: 700; color: var(--label); }
    #live resp-val  { color: var(--label); }
    #live-hr-val   { color: var(--label); }
    #live-bp-val   { color: var(--label); }

    /* ── Section headers ── */
    .section-title {
      font-size: 9px; letter-spacing: 0.3em;
      color: var(--muted2);
      margin-bottom: 12px;
      margin-top: 24px;
    }

    /* ── Control buttons ── */
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .sensor-toggle {
      width: 100%;
    }

    .contrl-btn {
      position: relative;
      padding: 14px 12px;
      border-radius: 6px;
      border: 1px solid;
      background: linear-gradient(180deg, var(--surface2), var(--surface));
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: inherit;
      min-height: 76px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }
    .contrl-btn:hover  { transform: translateY(-1px); filter: brightness(1.08); }
    .contrl-btn:active { transform: translateY(0); }
    .contrl-btn.active { filter: brightness(1.18); box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 18px rgba(255,255,255,0.03); }
    .contrl-btn.active::after {
      content: '▶';
      position: absolute; top: 8px; right: 10px;
      font-size: 8px; opacity: 0.7;
    }

    .s-name  { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 6px; }
    .s-vals  { font-size: 10px; color: var(--muted2); opacity: 1; }

    .off-finger {
      border-color: rgba(255,107,134,0.7);
      color: #ffd7df;
      background: linear-gradient(180deg, rgba(255,107,134,0.18), rgba(255,107,134,0.08));
    } 
    .on-finger {
      border-color: rgba(86,227,255,0.7);
      color: #dff9ff;
      background: linear-gradient(180deg, rgba(86,227,255,0.18), rgba(86,227,255,0.08));
    }

    /* ── Manual sliders ── */
    .sliders { display: flex; flex-direction: column; gap: 18px; }

    .slider-row {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      align-items: center;
      gap: 12px;
    }
    .slider-name { font-size: 10px; letter-spacing: 0.15em; color: var(--muted2); }
    .slider-values { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .slider-val  { font-size: 14px; font-weight: 700; text-align: right; color: var(--cyan); }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--cyan);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,255,0.5);
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--cyan);
      cursor: pointer;
      border: none;
    }

    /* ── Transition speed ── */
    .speed-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .speed-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted2);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .speed-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .speed-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(86,227,255,0.12); }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: #222;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="page-header">
    <span class="page-title">SIMOX · ASSESSOR PANEL</span>
    <span class="conn-badge" id="conn-badge">DISCONNECTED</span>
  </div>

  <!-- Live readout -->
  <div class="readout">
    <div class="readout-item">
      <div class="readout-label">CURRENT SpO₂</div>
      <div class="readout-val" id="live-spo2-val">98<span style="font-size:14px;opacity:0.5">%</span></div>
    </div>
    <div class="readout-item">
      <div class="readout-label">CURRENT RESP</div>
      <div class="readout-val" id="live-resp-val">16<span style="font-size:14px;opacity:0.5"> bpm</span></div>
    </div>
    <div class="readout-item">
      <div class="readout-label">CURRENT HR</div>
      <div class="readout-val" id="live-hr-val">72<span style="font-size:14px;opacity:0.5"> bpm</span></div>
    </div>
    <div class="readout-item">
      <div class="readout-label">CURRENT NIBP</div>
      <div class="readout-val-bp" id="live-bp-val">120/80<span style="font-size:14px;opacity:0.5"> mmHg</span></div>
    </div>
  </div>

  <!-- Control buttons -->
  <div class="section-title">CONTROL BUTTONS</div>
  <div class="buttons" id="buttons">

    <button class="contrl-btn sensor-toggle on-finger" id="finger-toggle-btn" type="button">
      <div class="s-name" id="finger-toggle-title">Finger Clip: ON</div>
      <div class="s-vals" id="finger-toggle-desc">Click to turn clip OFF and show dashes</div>
    </button>

    <button class="contrl-btn sensor-toggle on-finger" id="cuff-toggle-btn" type="button">
      <div class="s-name" id="cuff-toggle-title">Blood Pressure Cuff: ON</div>
      <div class="s-vals" id="cuff-toggle-desc">Click to turn cuff OFF and show dashes</div>
    </button>

    <button class="contrl-btn sensor-toggle on-finger" id="colour-toggle-btn" type="button">
      <div class="s-name" id="colour-toggle-title">Show Colours: ON</div>
      <div class="s-vals" id="colour-toggle-desc">Click to turn colours OFF and show white values</div>
    </button>

  </div>

  <!-- Manual sliders -->
  <div class="section-title" style="margin-top:32px">MANUAL CONTROL</div>
  <div class="sliders">

    <div class="slider-row">
      <span class="slider-name">SpO₂</span>
      <input type="range" id="spo2-slider" min="50" max="100" value="98" step="1">
      <span class="slider-values">
        <span class="slider-val" id="spo2-slider-val">98%</span>
      </span>
    </div>

    <div class="slider-row">
      <span class="slider-name">Resp Rate</span>
      <input type="range" id="resp-slider" min="5" max="40" value="16" step="1">
      <span class="slider-values">
        <span class="slider-val" id="resp-slider-val">16 brpm</span>
      </span>
    </div>

    <div class="slider-row">
      <span class="slider-name">HR</span>
      <input type="range" id="hr-slider" min="20" max="200" value="72" step="1">
      <span class="slider-values">
        <span class="slider-val" id="hr-slider-val">72</span>
      </span>
    </div>
    
    <div class="slider-row">
      <span class="slider-name">BPsys</span>
      <input type="range" id="bpsys-slider" min="20" max="250" value="120" step="1">
      <span class="slider-values">
        <span class="slider-val" id="bpsys-slider-val">120</span>
      </span>
    </div>

    <div class="slider-row">
      <span class="slider-name">BPDia</span>
      <input type="range" id="bpdia-slider" min="20" max="200" value="80" step="1">
      <span class="slider-values">
        <span class="slider-val" id="bpdia-slider-val">80</span>
      </span>
    </div>

  </div>

  <!-- Transition speed -->
  <div class="section-title" style="margin-top:28px">TRANSITION SPEED</div>
  <div class="speed-row" id="speed-btns">
    <button class="speed-btn" data-t="2">SUDDEN</button>
    <button class="speed-btn active" data-t="20">GRADUAL (20s)</button>
    <button class="speed-btn" data-t="60">SLOW (60s)</button>
  </div>

  <div class="footer">SIMOX · FOR SIMULATION USE ONLY</div>
</div>

<script>
// ── Socket ────────────────────────────────────────────
const socket = io();
const badge  = document.getElementById('conn-badge');
socket.on('connect',    () => { badge.textContent = 'CONNECTED'; badge.className = 'conn-badge ok'; });
socket.on('disconnect', () => { badge.textContent = 'DISCONNECTED'; badge.className = 'conn-badge err'; });

let currentState = { spo2: 98, resp: 16, hr: 72, bpsys: 120, bpdia: 80, SpO2On: true, bpCuffOn: true, showColours: true, transitionTime: 20 };
let targetState = { spo2: 98, resp: 16, hr: 72, bpsys: 120, bpdia: 80, SpO2On: true, bpCuffOn: true, showColours: true, transitionTime: 20 };

socket.on('state', (s) => {
  currentState = { ...currentState, ...s };
  if (s.target) {
    targetState = { ...targetState, ...s.target };
  }
  syncUI();
  // Sync speed button UI to transitionTime from state
  if (typeof currentState.transitionTime === 'number') {
    document.querySelectorAll('.speed-btn').forEach(b => {
      if (parseFloat(b.dataset.t) === currentState.transitionTime) {
        b.classList.add('active');
      } else {
        b.classList.remove('active');
      }
    });
  }
});

function send(patch) {
  const { snap, ...storedPatch } = patch;
  targetState = { ...targetState, ...storedPatch };
  socket.emit('setState', patch);
  syncUI();
}

// ── Sync UI to state ──────────────────────────────────
function syncUI() {
  const roundedSpo2 = Math.round(currentState.spo2);
  const roundedResp = Math.round(currentState.resp);
  const roundedHr = Math.round(currentState.hr);
  const roundedBPSys = Math.round(currentState.bpsys);
  const roundedBPDia = Math.round(currentState.bpdia);
  const viewSpo2 = targetState.spo2;
  const viewResp = targetState.resp;
  const viewHr = targetState.hr;
  const viewBPSys = targetState.bpsys;
  const viewBPDia = targetState.bpdia;
  const roundedViewSpo2 = Math.round(viewSpo2);
  const roundedViewResp = Math.round(viewResp);
  const roundedViewHr = Math.round(viewHr);
  const roundedViewBPSys = Math.round(viewBPSys);
  const roundedViewBPDia = Math.round(viewBPDia);

  const liveSpo2El = document.getElementById('live-spo2-val');
  const liveRespEl = document.getElementById('live-resp-val');
  const liveHrEl = document.getElementById('live-hr-val');
  const liveBpEl = document.getElementById('live-bp-val');

  if (currentState.SpO2On) {
      liveSpo2El.innerHTML = `${roundedSpo2}<span style="font-size:14px;opacity:0.5">%</span>`;
    if (currentState.showColours) {
      const spo2Color = roundedSpo2 >= 95 ? 'var(--green)'
                      : roundedSpo2 >= 90 ? 'var(--yellow)'
                      : 'var(--red)';
      liveSpo2El.style.color = spo2Color;
    }
    else{
      liveSpo2El.style.color = 'var(--label)';
    }

    liveHrEl.innerHTML = `${roundedHr}<span style="font-size:14px;opacity:0.5"> bpm</span>`;
    // HR colour thresholds
    if (currentState.showColours) {
      const HRcolor = roundedHr >= 131 ? 'var(--red)'
            : roundedHr >= 111 ? 'var(--orange)'
            : roundedHr >= 91  ? 'var(--yellow)'
            : roundedHr > 51   ? 'var(--green)'
            : roundedHr >= 41  ? 'var(--yellow)'
            : 'var(--red)';
      liveHrEl.style.color = HRcolor;
    }
    else{
      liveHrEl.style.color = 'var(--label)';
    }
    
    // Resp
    if (currentState.showColours) {
      const RespColor = roundedResp >= 25 ? 'var(--red)'
                  : roundedResp >= 21 ? 'var(--orange)'
                  : roundedResp >= 12 ? 'var(--green)'
                  : roundedResp >= 9  ? 'var(--yellow)'
                  : 'var(--red)';
      liveRespEl.style.color = RespColor;
    }
    else{
      liveRespEl.style.color = 'var(--label)';
    }
    liveRespEl.innerHTML = `${roundedResp}<span style="font-size:14px;opacity:0.5"> bpm</span>`;
  } else {
    liveSpo2El.innerHTML = '<span style="color:var(--label)">---</span>';
    liveSpo2El.style.color = 'var(--label)';
    liveHrEl.innerHTML = '<span style="color:var(--label)">---</span>';
    liveHrEl.style.color = 'var(--label)';
    liveRespEl.innerHTML = '<span style="color:var(--label)">---</span>';
    liveRespEl.style.color = 'var(--label)';

  }

  if (currentState.bpCuffOn) {
    liveBpEl.innerHTML = `${roundedBPSys}/${roundedBPDia}<span style="font-size:14px;opacity:0.5"> mmHg</span>`;
    // BP colour thresholds (based on systolic)
    if (currentState.showColours) {
      const BPcolor = roundedBPSys >= 220 ? 'var(--red)'
            : roundedBPSys >= 111 ? 'var(--green)'
            : roundedBPSys >= 101  ? 'var(--yellow)'
            : roundedBPSys >= 91   ? 'var(--orange)'
            : 'var(--red)';
      liveBpEl.style.color = BPcolor;
    }
    else{
      liveBpEl.style.color = 'var(--label)';
    }
  } else {
    liveBpEl.innerHTML = '<span style="color:var(--label)">---/---</span><span style="font-size:14px;opacity:0.5"> mmHg</span>';
    liveBpEl.style.color = 'var(--label)';
  }

  // Sliders
  document.getElementById('spo2-slider').value = viewSpo2;
  document.getElementById('resp-slider').value = viewResp;
  document.getElementById('hr-slider').value   = viewHr;
  document.getElementById('bpsys-slider').value = viewBPSys;
  document.getElementById('bpdia-slider').value = viewBPDia;
  document.getElementById('spo2-slider-val').textContent = `${roundedViewSpo2}%`;
  document.getElementById('resp-slider-val').textContent = `${roundedViewResp}`;
  document.getElementById('hr-slider-val').textContent   = `${roundedViewHr}`;
  document.getElementById('bpsys-slider-val').textContent = `${roundedViewBPSys}`;
  document.getElementById('bpdia-slider-val').textContent = `${roundedViewBPDia}`;

  const toggleBtn = document.getElementById('finger-toggle-btn');
  const toggleTitle = document.getElementById('finger-toggle-title');
  const toggleDesc = document.getElementById('finger-toggle-desc');
  const isOn = currentState.SpO2On;
  toggleBtn.classList.remove('on-finger', 'off-finger');
  toggleBtn.classList.add(isOn ? 'on-finger' : 'off-finger');
  toggleTitle.textContent = `Finger Clip: ${isOn ? 'ON' : 'OFF'}`;
  toggleDesc.textContent = isOn
    ? 'Click to turn clip OFF and show dashes'
    : 'Click to turn clip ON and apply slider values';

  const cuffBtn = document.getElementById('cuff-toggle-btn');
  const cuffTitle = document.getElementById('cuff-toggle-title');
  const cuffDesc = document.getElementById('cuff-toggle-desc');
  const cuffIsOn = currentState.bpCuffOn;
  cuffBtn.classList.remove('on-finger', 'off-finger');
  cuffBtn.classList.add(cuffIsOn ? 'on-finger' : 'off-finger');
  cuffTitle.textContent = `Blood Pressure Cuff: ${cuffIsOn ? 'ON' : 'OFF'}`;
  cuffDesc.textContent = cuffIsOn
    ? 'Click to turn cuff OFF and show dashes'
    : 'Click to turn cuff ON and show BP values';
  
  const colourBtn = document.getElementById('colour-toggle-btn');
  const colourTitle = document.getElementById('colour-toggle-title');
  const colourDesc = document.getElementById('colour-toggle-desc');
  const colourIsOn = currentState.showColours;
  colourBtn.classList.remove('on-finger', 'off-finger');
  colourBtn.classList.add(colourIsOn ? 'on-finger' : 'off-finger');
  colourTitle.textContent = `Show Colours: ${colourIsOn ? 'ON' : 'OFF'}`;
  colourDesc.textContent = colourIsOn
    ? 'Click to turn colours OFF and show white values'
    : 'Click to turn colours ON and show coloured values based on thresholds';
}

// ── Control buttons ──────────────────────────────────
document.getElementById('buttons').addEventListener('click', (e) => {
  const fingerBtn = e.target.closest('#finger-toggle-btn');
  const cuffBtn = e.target.closest('#cuff-toggle-btn');
  const colourBtn = e.target.closest('#colour-toggle-btn');
  if (!fingerBtn && !cuffBtn && !colourBtn) return;

  if (cuffBtn) {
    const nextCuffOn = !currentState.bpCuffOn;
    send({ bpCuffOn: nextCuffOn, snap: true });
    return;
  }

  if (colourBtn) {
    const nextColourOn = !currentState.showColours;
    send({ showColours: nextColourOn });
    return;
  }

  const nextIsOn = !currentState.SpO2On;
  send({ SpO2On: nextIsOn, snap: true });
});

// ── Sliders ───────────────────────────────────────────
function hookSlider(id, valId, key, suffix = '') {
  const slider = document.getElementById(id);
  const label  = document.getElementById(valId);
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    label.textContent = `${Math.round(v)}${suffix}`;
    send({ [key]: v });
  });
}
hookSlider('spo2-slider', 'spo2-slider-val', 'spo2', '%');
hookSlider('resp-slider', 'resp-slider-val', 'resp');
hookSlider('hr-slider',   'hr-slider-val',   'hr');
hookSlider('bpsys-slider', 'bpsys-slider-val', 'bpsys');
hookSlider('bpdia-slider', 'bpdia-slider-val', 'bpdia');

// ── Transition speed ──────────────────────────────────
document.getElementById('speed-btns').addEventListener('click', (e) => {
  const btn = e.target.closest('.speed-btn');
  if (!btn) return;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  send({ transitionTime: parseFloat(btn.dataset.t) });
});
</script>
</body>
</html>
